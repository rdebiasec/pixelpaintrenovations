# Publishes the Vite site to GitHub Pages. Only the `main` branch deploys.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit (high/critical)
        run: npm audit --audit-level=high

      - name: Check for custom domain
        id: check_domain
        run: |
          if [ -f "CNAME" ] || [ -f "public/CNAME" ]; then
            echo "has_custom_domain=true" >> $GITHUB_OUTPUT
            echo "base_path=/" >> $GITHUB_OUTPUT
          else
            echo "has_custom_domain=false" >> $GITHUB_OUTPUT
            echo "base_path=/pixelpaintrenovations/" >> $GITHUB_OUTPUT
          fi

      - name: Ensure logo assets
        run: |
          if [ ! -f "public/logo.png" ] && [ -f "public/logo-source.png" ]; then
            node scripts/process-logo.mjs
          fi

      - name: Build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: ${{ steps.check_domain.outputs.base_path }}
          VITE_FORMSPREE_FORM_ID: ${{ secrets.VITE_FORMSPREE_FORM_ID }}
          VITE_PLAUSIBLE_DOMAIN: ${{ secrets.VITE_PLAUSIBLE_DOMAIN }}
          VITE_GA4_ID: ${{ secrets.VITE_GA4_ID }}
        run: npm run build

      # Reinforces scripts/check-dist.mjs so a broken SEO/CSP patch cannot ship.
      - name: Verify CSP in dist
        run: |
          set -euo pipefail
          HOME_HTML="dist/index.html"
          if [ ! -f "$HOME_HTML" ]; then
            echo "Missing $HOME_HTML"
            exit 1
          fi
          if ! grep -q 'Content-Security-Policy' "$HOME_HTML"; then
            echo "dist/index.html missing Content-Security-Policy"
            exit 1
          fi
          if ! grep -q 'form-action' "$HOME_HTML"; then
            echo "dist/index.html CSP missing form-action"
            exit 1
          fi
          echo "CSP checks OK"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
